      postgres-notification:
        condition: service_healthy
    networks:
      - myautospace-network

  adminservice:
    build:
      context: .
      dockerfile: AdminService/Dockerfile
    container_name: myautospace-adminservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__AdminDb: Host=postgres-admin;Port=5432;Database=admin_db;Username=postgres;Password=postgres
    ports:
      - "5029:8080"
    depends_on:
      postgres-admin:
        condition: service_healthy
    networks:
      - myautospace-network

  paymentservice:
    build:
      context: .
      dockerfile: PaymentService/Dockerfile
    container_name: myautospace-paymentservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5269:8080"
    networks:
      - myautospace-network

  reviewservice:
    build:
      context: .
      dockerfile: ReviewService/Dockerfile
    container_name: myautospace-reviewservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5001:8080"
    networks:
      - myautospace-network

  mediaservice:
    build:
      context: .
      dockerfile: MediaService/Dockerfile
    container_name: myautospace-mediaservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5055:8080"
    networks:
      - myautospace-network

  contractservice:
    build:
      context: .
      dockerfile: ContractService/Dockerfile
    container_name: myautospace-contractservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
