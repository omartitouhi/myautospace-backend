    container_name: myautospace-mapservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__MapDb: Host=postgres-map;Port=5432;Database=map_db;Username=postgres;Password=postgres
      Jwt__Key: dev-only-myautospace-authservice-signing-key-please-replace-outside-development
      Jwt__Issuer: MyAutoSpace.AuthService
      Jwt__Audience: MyAutoSpace.Clients
    ports:
      - "5247:8080"
    depends_on:
      postgres-map:
        condition: service_healthy
    networks:
      - myautospace-network

  fraudservice:
    build:
      context: .
      dockerfile: FraudService/Dockerfile
    container_name: myautospace-fraudservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5105:8080"
    networks:
