services:
  postgres-auth:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-user:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-search:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-search
    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-search-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-notification:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-vehicle:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-vehicle
    environment:
      POSTGRES_DB: vehicle_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres-vehicle-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-booking:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-booking
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-admin:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-admin
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres-admin-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-provider:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-provider
    environment:
      POSTGRES_DB: provider_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-provider-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  postgres-map:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    container_name: myautospace-postgres-map
    environment:
      POSTGRES_DB: map_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - postgres-map-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  authservice:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: myautospace-authservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__AuthDb: Host=postgres-auth;Port=5432;Database=auth_db;Username=postgres;Password=postgres
    ports:
      - "5003:8080"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - myautospace-network

  userservice:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    container_name: myautospace-userservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__UserDb: Host=postgres-user;Port=5432;Database=user_db;Username=postgres;Password=postgres
    ports:
      - "5076:8080"
    depends_on:
      postgres-user:
        condition: service_healthy
    networks:
      - myautospace-network

  vehicleservice:
    build:
      context: .
      dockerfile: VehicleService/Dockerfile
    container_name: myautospace-vehicleservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__VehicleDb: Host=postgres-vehicle;Port=5432;Database=vehicle_db;Username=postgres;Password=postgres
      SearchService__BaseUrl: http://searchservice:8080
    ports:
      - "5155:8080"
    depends_on:
      postgres-vehicle:
        condition: service_healthy
    networks:
      - myautospace-network

  bookingservice:
    build:
      context: .
      dockerfile: BookingService/Dockerfile
    container_name: myautospace-bookingservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__BookingDb: Host=postgres-booking;Port=5432;Database=booking_db;Username=postgres;Password=postgres
      VehicleService__BaseUrl: http://vehicleservice:8080
      Jwt__Key: dev-only-myautospace-authservice-signing-key-please-replace-outside-development
      Jwt__Issuer: MyAutoSpace.AuthService
      Jwt__Audience: MyAutoSpace.Clients
    ports:
      - "5110:8080"
    depends_on:
      postgres-booking:
        condition: service_healthy
    networks:
      - myautospace-network

  searchservice:
    build:
      context: .
      dockerfile: SearchService/Dockerfile
    container_name: myautospace-searchservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__SearchDb: Host=postgres-search;Port=5432;Database=search_db;Username=postgres;Password=postgres
    ports:
      - "5069:8080"
    depends_on:
      postgres-search:
        condition: service_healthy
    networks:
      - myautospace-network

  notificationservice:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: myautospace-notificationservice
    environment:
