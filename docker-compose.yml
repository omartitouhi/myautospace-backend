  providerservice:
    build:
      context: .
      dockerfile: ProviderService/Dockerfile
    container_name: myautospace-providerservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "true"
      ConnectionStrings__ProviderDb: Host=postgres-provider;Port=5432;Database=provider_db;Username=postgres;Password=postgres
      Jwt__Key: dev-only-myautospace-authservice-signing-key-please-replace-outside-development
      Jwt__Issuer: MyAutoSpace.AuthService
      Jwt__Audience: MyAutoSpace.Clients
    ports:
      - "5241:8080"
    depends_on:
      postgres-provider:
        condition: service_healthy
    networks:
      - myautospace-network

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: myautospace-apigateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: dev-only-myautospace-authservice-signing-key-please-replace-outside-development
      Jwt__Issuer: MyAutoSpace.AuthService
      Jwt__Audience: MyAutoSpace.Clients
      ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address: http://authservice:8080/
      ReverseProxy__Clusters__users-cluster__Destinations__users-service__Address: http://userservice:8080/
      ReverseProxy__Clusters__vehicles-cluster__Destinations__vehicles-service__Address: http://vehicleservice:8080/
      ReverseProxy__Clusters__bookings-cluster__Destinations__bookings-service__Address: http://bookingservice:8080/
      ReverseProxy__Clusters__payments-cluster__Destinations__payments-service__Address: http://paymentservice:8080/
      ReverseProxy__Clusters__notifications-cluster__Destinations__notifications-service__Address: http://notificationservice:8080/
      ReverseProxy__Clusters__reviews-cluster__Destinations__reviews-service__Address: http://reviewservice:8080/
      ReverseProxy__Clusters__search-cluster__Destinations__search-service__Address: http://searchservice:8080/
      ReverseProxy__Clusters__media-cluster__Destinations__media-service__Address: http://mediaservice:8080/
      ReverseProxy__Clusters__contracts-cluster__Destinations__contracts-service__Address: http://contractservice:8080/
      ReverseProxy__Clusters__messages-cluster__Destinations__messages-service__Address: http://messagingservice:8080/
      ReverseProxy__Clusters__maps-cluster__Destinations__maps-service__Address: http://mapservice:8080/
      ReverseProxy__Clusters__fraud-cluster__Destinations__fraud-service__Address: http://fraudservice:8080/
      ReverseProxy__Clusters__admin-cluster__Destinations__admin-service__Address: http://adminservice:8080/
      ReverseProxy__Clusters__providers-cluster__Destinations__providers-service__Address: http://providerservice:8080/
    ports:
      - "5050:8080"
    depends_on:
      - authservice
      - userservice
      - vehicleservice
      - bookingservice
      - paymentservice
      - notificationservice
      - reviewservice
      - searchservice
      - mediaservice
      - contractservice
      - messagingservice
      - mapservice
      - fraudservice
      - adminservice
      - providerservice
    networks:
      - myautospace-network

networks:
  myautospace-network:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-search-data:
  postgres-notification-data:
  postgres-vehicle-data:
  postgres-booking-data:
  postgres-admin-data:
  postgres-provider-data:
  postgres-map-data:
