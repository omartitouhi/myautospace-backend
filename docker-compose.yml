services:
  postgres-auth:
    image: postgres:16
    container_name: myautospace-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - myautospace-network

  authservice:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: myautospace-authservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AuthDb: Host=postgres-auth;Port=5432;Database=auth_db;Username=postgres;Password=postgres
    expose:
      - "8080"
    depends_on:
      - postgres-auth
    networks:
      - myautospace-network

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: myautospace-apigateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address: http://authservice:8080/
    ports:
      - "5000:8080"
    depends_on:
      - authservice
    networks:
      - myautospace-network

networks:
  myautospace-network:
    driver: bridge

volumes:
  postgres-auth-data:
